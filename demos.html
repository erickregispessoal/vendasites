<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demonstração dos Templates - VendaSites</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500:'#6366f1', 600:'#4f46e5' },
                        whatsapp: { DEFAULT:'#25D366', dark:'#128C7E' },
                        dark: { 50:'#fafafa', 100:'#f4f4f5', 200:'#e4e4e7', 300:'#d4d4d8', 400:'#a1a1aa', 500:'#71717a', 600:'#52525b', 700:'#3f3f46', 800:'#27272a', 900:'#18181b', 950:'#09090b' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-950 text-white font-sans antialiased">

<nav class="fixed top-0 left-0 right-0 z-50 bg-dark-950/80 backdrop-blur-xl border-b border-white/5">
    <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
        <a href="index.html" class="text-sm font-semibold text-dark-400 hover:text-white transition-colors flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Voltar ao Início
        </a>
        <a href="https://wa.me/5547996451567?text=Ol%C3%A1!%20Vim%20pela%20demonstra%C3%A7%C3%A3o%20e%20quero%20um%20or%C3%A7amento." target="_blank" class="inline-flex items-center gap-2 bg-whatsapp text-white px-4 py-2 rounded-full text-xs font-semibold hover:bg-whatsapp-dark transition-all">
            <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
            WhatsApp
        </a>
    </div>
</nav>

<main class="pt-20 pb-16">
    <div class="max-w-7xl mx-auto px-6 lg:px-8">
        <div class="text-center mb-10">
            <h1 class="text-3xl sm:text-4xl font-black tracking-tight mb-3">Veja os Templates em Ação</h1>
            <p class="text-dark-400">Clique nas abas abaixo para visualizar cada template</p>
        </div>

        <div class="flex flex-wrap justify-center gap-2 sm:gap-3 mb-8">
            <button onclick="showDemo('lanchonete')" id="tab-lanchonete" class="demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-brand-500 text-white transition-all">Lanchonete</button>
            <button onclick="showDemo('barbearia')" id="tab-barbearia" class="demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-dark-800 text-dark-400 border border-white/5 hover:border-white/15 transition-all">Barbearia</button>
            <button onclick="showDemo('pizzaria')" id="tab-pizzaria" class="demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-dark-800 text-dark-400 border border-white/5 hover:border-white/15 transition-all">Pizzaria</button>
            <button onclick="showDemo('restaurante')" id="tab-restaurante" class="demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-dark-800 text-dark-400 border border-white/5 hover:border-white/15 transition-all">Restaurante</button>
            <button onclick="showDemo('salao')" id="tab-salao" class="demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-dark-800 text-dark-400 border border-white/5 hover:border-white/15 transition-all">Salão</button>
        </div>

        <div class="rounded-2xl overflow-hidden border border-white/10 shadow-2xl shadow-black/40" style="height: 70vh;">
            <iframe id="demoFrame" src="https://erickregispessoal.github.io/lanchoneteze/" class="w-full h-full border-0"></iframe>
        </div>

        <div class="text-center mt-10">
            <a href="https://wa.me/5547996451567?text=Ol%C3%A1!%20Vi%20os%20templates%20e%20quero%20um%20site%20assim!" target="_blank" class="inline-flex items-center gap-2 bg-brand-500 text-white px-8 py-4 rounded-xl text-base font-semibold hover:bg-brand-600 transition-all hover:-translate-y-0.5 hover:shadow-[0_12px_40px_rgba(99,102,241,0.3)]">
                Quero um Site Assim
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
        </div>
    </div>
</main>

<script>
var tabs = ['lanchonete','barbearia','pizzaria','restaurante','salao'];
var urls = {
    lanchonete: 'https://erickregispessoal.github.io/lanchoneteze/',
    barbearia: 'https://erickregispessoal.github.io/barberlux/',
    pizzaria: 'https://erickregispessoal.github.io/pizzariapro/',
    restaurante: 'https://erickregispessoal.github.io/restaurantesophia/',
    salao: 'https://erickregispessoal.github.io/salonedebeleza/'
};

function showDemo(type) {
    var frame = document.getElementById('demoFrame');
    frame.src = urls[type];
    tabs.forEach(function(t) {
        var btn = document.getElementById('tab-'+t);
        if (t === type) {
            btn.className = 'demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-brand-500 text-white transition-all';
        } else {
            btn.className = 'demo-tab px-4 sm:px-6 py-2.5 rounded-xl text-sm font-semibold bg-dark-800 text-dark-400 border border-white/5 hover:border-white/15 transition-all';
        }
    });
}
</script>

</body>
</html>
